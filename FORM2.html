<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document2</title>

    <style>
         form {
            max-width: 900px;
            margin: 80px auto;
        }

* {
    box-sizing: border-box;
}
        input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 3px;

}
    </style>

  </head>

  <body>
    <form>
      <fieldset>
        <legend><strong> Formulário </strong></legend>
        Nome:
        <input
          type="text"
          name="nome"
          placeholder="Digite seu nome!"
          required
        /><br /><br />
        Email:
        <input
          type="text"
          name="email"
          placeholder="Digite seu email!"
          required
        /><br /><br />
        Mensagem:
        <textarea
          name="mensagem"
          placeholder="Digite uma mensagem!"
          cols="70"
          rows="6"
        ></textarea>
      </fieldset>
    </form>
  </body>
</html>
